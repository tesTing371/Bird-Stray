<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漂鳥集 - 宇宙星空詩集</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #02020a; font-family: "PingFang TC", "Microsoft JhengHei", serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 30px; left: 30px; color: white; z-index: 10; pointer-events: none; transition: opacity 0.5s; }
        h1 { font-weight: 100; letter-spacing: 8px; font-size: 1.4rem; margin: 0; opacity: 0.6; }
        .hint { font-size: 0.8rem; color: rgba(200, 200, 255, 0.4); margin-top: 8px; }

        #poem-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 100; background: rgba(2, 2, 10, 0.85);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        #poem-content {
            width: 85%; max-width: 600px;
            color: #ffffff; font-size: 1.4rem; line-height: 1.8;
            text-align: center; letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: fadeIn 0.5s ease-out;
        }

        #back-tip {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>漂鳥集</h1>
        <div class="hint">打撈彩色星辰：75 個靈魂節點</div>
    </div>

    <div id="poem-overlay">
        <div id="poem-content"></div>
        <div id="back-tip">點擊任意處返回星空</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let bgStars = [];
        let poemNodes = [];
        let isTextMode = false;
        
        const poems = ["嶄新的羽翼挾帶著春天飛來，我打招呼，掉落的音符成為回應。\n暮年的枝杆，它們選擇保留嗓音，為後來者舖下遍地黃昏。", "在紙筆的親密之間，需要過路費，請不要吝嗇你們的冒險故事。", "世界之大我窮盡一生也看不清全貌，她卻牽著我舞蹈，一圈又一圈，留下日月星河。", "她一直微笑，像朵永恆綻放的花卉，不論青春或衰老。\n季節的輪轉裡，春天是四分之一的無限。", "面對植物的追求，沙漠態度常有反差，背地裡卻會為自己的不坦率哭成一座綠洲。", "等你流盡悲傷，記得睜開眼，太陽正等著照亮你，星星也未曾遠離。", "那是一道漫長的身影，總結了泥沙的猶豫與激情。那是靈動而柔軟的身影，撩撥又無形。", "我的夢境拿不定主意，使她好奇窺探，突然間，她的目光成為劇本，糊裡糊塗開始了。", "電影在我的內心大獲成功，可妳不知道自己是導演。", "憂慮就像我發現自己正在呼吸，然後就再也不自然了。", "遙遠的，還看不見的日子裡，我在沉浮。有股暖流，代替幾隻手安撫過我。", "「天空啊，岸上的人說我們有點曖昧。」「為什麼？」「他們說望向遠處分不清天海的邊界。」\n「海水啊，可我們從來沒碰到彼此。」", "我和生命有一人具有病態依賴。是我不能沒有他，還是他在渴求我？", "書之所以為書，是它告訴我知識，還是我賦予它文字？", "峭壁孤高冷峻，不被輕易征服，卻也因此沒人接過它的花束。", "每天的世界都像是一個夢，喊我起床又快速離去。", "海風在我耳邊低語，海鳥不在意，拍拍翅膀卻仍定在空中偷聽。", "影子比我誠實一些，他始終如一，不論我有沒有轉身，都不屑擺出表情。", "神啊，合掌時突發的淫慾是強迫性思維。也正因此我才能虔誠的來懺悔。", "決定前就被淘汰的選項，不會成為更好的結果，不要回頭跟影子計較，前方便是光。", "我用燈照亮自己，洗去泥濘，關燈後我又躺了回去，變成那個烏黑模糊的樣子。", "我嘗試意識自己，便覺得手腳遠去，頭昏眼花，等我醒來一切如故，彷彿剛才的恍惚只是無聊的電影。", "颱風的愛很傲慢，除了它眼中的人，其他都不重要，偶爾甚至不願賞你一眼。", "時間和精神，是橋的兩端，互不相干但缺一不可。", "第一次受傷前，我的勇敢近於無限。", "我請來一些無神論者給神明過生日，想看看他們究竟是不信神還是不敬神。", "虛無的人也能自己孕育光芒，只要有什麼能夠讓他宇宙大爆炸！", "真正的美會讓人思考延遲，然後拼命回味，用語言去捕捉消退的感觸，就像回想一場奇幻的夢。", "海浪不斷獻花，我便想在石頭上刻上名字，邀請妳在遙遠的另一邊回來探望。", "安靜的夜裡月亮微笑，問它為什麼高興，它說看見那些夢境與星星一起閃耀。", "今早打開窗戶，一片葉子飄進來，上面是陽光的寄語，未簽收。", "世界的清晨是萬物醒來，也是萬物回來。", "人類最偉大的行動，莫過於拋棄一切利害去愛。", "泥沙定居、橋樑失能，樹枝石頭堆積再加上一點死亡，就是河的遺言。", "任何自由飛行的鳥，都有一隻相伴的烏鴉，替牠們補足錯過的陸地。", "瀑布為什麼壯麗？難道不是它反覆墜落殉道，以歌聲中的寂靜，作修行沉思者的啟蒙？", "對生命保有熱情，就像心臟為身體跳動，失去熱情，便會視生命如死物。", "我穿著母親的掌印如厚繭下柔軟的肌膚。", "太陽，一個沉默寡言的指揮，人們在你現身前準備，好在亮相時就能感受到熱情與生機。", "食物的新鮮美味是短暫的，所以不要因為心情讓它提前腐敗。", "樹木與人類的矛盾就像前任情人，為了生存而砍伐，然後再以同樣的理由種回來。", "刪刪改改那麼多文字不如直接見面，讓妳親眼看我害羞臉紅的樣子。", "人們搭乘飛機、汽車、遊輪、因為永遠不屬於天空與海洋，甚至在陸上 也來去匆忙。", "世界就是按下白鍵，黑鍵抱怨不公平，踩了踏板，音符又嫌管太多，放下琴蓋，鋼琴便覺得天性被冒犯。總之是一首熱鬧的曲子。", "周圍的人們等著鐵匠把我的舌頭燒紅，然後敲打，冷萃，他們向我介紹有潑辣、尖銳、冷漠三種口味。", "傾吐其實是歸還，等到終於能大口呼吸的時候，便擁擁有了新生。", "我試圖用更強烈的光芒驅散影子，卻發現他也變得濃厚，我置身無數光線中心，而他也變的無處不在。", "旅人不經意提問，讓星星開始思考自己為何會發光，為何能在天空，不久後星星就墜落成螢火蟲了。", "輪子並不在意壓過的土石，它有著任意通行的自由，也沒想過路從何而來。", "心臟因為期待每一天而雀躍著。", "偶像遺失了自己，否則他怎麼會有空間容納來自世界各地的遺失呢？", "你在你的歷史中是完整的、和諧的，出生是最驚豔的起頭，一如死亡是最深刻的收筆。", "夜燈故意不亮，不為人的恐懼負責，憧憬更亮的、更高的月亮，夜燈討厭吊燈勸導，雖然他也比較亮、比較高，夜燈故意不亮，最後被丟掉了。", "海鷗眼中的海浪爭搶著上岸，忍不住咯咯笑，他有著偉大的目標，向著遊客乞食而去。", "我是白晝燒盡的一點塵埃，飄在虛無之間再燃，喔！一床銀河。", "夢裡話語是模糊的，當我醒來、飄下來，我的生命便開始轉動、滾動，就像一片急著欣賞沿途景色而衝下山的雪花！", "為了避免成為名字的獎盃，他國始終與成就保持一定距離，就像手和紙上的名字之間隔著筆。", "摸著自己乾癟皺縮的內在，擔心其他貝殼被抓去量產珍珠。", "永恆是停滯還是流動？停滯是某個瞬間被拉長，流動是數不清的瞬間，流動與停滯互為終結，永恆就是一切存在且同時存在，我生即死。", "想著破壞，憤怒的火焰便會點燃所有山林，最後火自己熄滅了，因為無處可燒，連破壞都被破壞了，徒留虛無。", "我的靈魂依傍著你的嘴，成為第一口複雜的湧入，微醺時，便貼近了真正的滋味；回甘時，唇齒間盡是我的名字。", "不全成為完全之前，還需要一點遺憾。", "人類的腦袋是座宮殿，為了治理身體，每個人都找了王，既反抗又順從。", "燈光是白晝的拾遺，火光是太陽的餘燼，燈火的溫暖明亮是小小的情緒錨點。", "突破磚石泥沙的雜草認為行人是雨，割草機是風，或者更加收斂委婉的調情。", "花朵與季節是多麼完美的伴侶，他們一起在世界裡枯萎、凋謝、重生。", "束縛使人意識自由，完全解放則是虛無，慾望的教徒殉道時，順道摧毀了來時路。", "探求永恆不變的真理，就像在河流中渴望安身的沙子，本身就是悖論。", "瀑布的慷慨，就是傾瀉氣力與歌聲，給修行的人、拍照的人，以及玩水的人、失神的孤旅的人。", "捧花應該給予大地，她的婚禮是晨光迸發前墜落的露珠，她孕育無數生靈，也包含花的故鄉。", "裝滿固執而又悲憤的腦袋，重重落下直至磨損，這種自殘式懺悔，源自根本的矛盾。", "一段段被裁剪的夜晚落下，前半屬於啟程的夢境，後半則是星宿的淚滴，我闖入無人露台，看見孤獨與悲傷消失的軌跡。", "當我們以裸體相見，羞赧與快感無法並存。", "愛情就像霧一樣，濃厚時四處皆有邀約暗示，引人探究聲音來源，相反，看得透徹時也就差不多散了。", "唯心主義者的心臟是堅定的唯物主義者，除非石頭能夠供血。"];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 350; i++) bgStars.push(new Star(false));
            for (let i = 0; i < poems.length; i++) poemNodes.push(new Star(true, poems[i]));
            
            // 綁定 Overlay 點擊（僅 HTML 層關閉）
            document.getElementById('poem-overlay').addEventListener('click', closePoem);
        }

        function draw() {
            background(2, 2, 10, 80);
            for (let s of bgStars) { s.update(); s.show(); }
            for (let n of poemNodes) { n.update(); n.show(); }
        }

        class Star {
            constructor(isPoem, content = "") {
                this.isPoem = isPoem;
                this.content = content;
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(random(-0.4, 0.4), random(-0.4, 0.4));
                this.size = isPoem ? random(5, 7) : random(1, 3);
                this.noiseOffset = random(1000);
                this.target = null;
                if (this.isPoem) {
                    let colors = [color(255,100,150), color(100,255,200), color(150,150,255), color(255,200,100), color(200,100,255)];
                    this.color = random(colors);
                } else {
                    this.color = color(255, 255, 255, 180);
                }
            }
            update() {
                if (isTextMode) {
                    let center = createVector(width/2, height/2);
                    let dir = p5.Vector.sub(this.pos, center);
                    dir.normalize();
                    this.pos.add(dir.mult(12));
                } else if (this.target) {
                    this.pos.lerp(this.target, 0.2);
                    if (dist(this.pos.x, this.pos.y, this.target.x, this.target.y) < 2) this.target = null;
                } else {
                    this.pos.add(this.vel);
                }
                if (this.pos.x < -100) this.pos.x = width + 100;
                if (this.pos.x > width + 100) this.pos.x = -100;
                if (this.pos.y < -100) this.pos.y = height + 100;
                if (this.pos.y > height + 100) this.pos.y = -100;
            }
            show() {
                noStroke();
                if (this.isPoem && !isTextMode) {
                    let blink = sin(frameCount * 0.1 + this.noiseOffset) * 60 + 195;
                    fill(red(this.color), green(this.color), blue(this.color), blink);
                    ellipse(this.pos.x, this.pos.y, this.size);
                    fill(red(this.color), green(this.color), blue(this.color), 45);
                    ellipse(this.pos.x, this.pos.y, this.size * 5);
                } else {
                    let t = noise(frameCount * 0.05 + this.noiseOffset) * 255;
                    fill(255, 255, 255, isTextMode ? 30 : t);
                    ellipse(this.pos.x, this.pos.y, this.size);
                }
            }
            recluster() {
                this.target = createVector(random(width), random(height));
            }
        }

        // --- 重點修復部分：分離觸控與滑鼠 ---

        function handleTrigger(mx, my) {
            if (isTextMode) return;
            for (let n of poemNodes) {
                if (dist(mx, my, n.pos.x, n.pos.y) < 50) { // 稍微加大手機判定
                    openPoem(n.content);
                    break;
                }
            }
        }

        // 手機專用偵測
        function touchStarted() {
            if (isTextMode) return false;
            handleTrigger(touches[0].x, touches[0].y);
            return false; // 防止事件穿透（最重要的部分）
        }

        // 電腦專用偵測
        function mousePressed() {
            if (touches.length > 0) return; // 如果有觸控，就不走滑鼠邏輯
            handleTrigger(mouseX, mouseY);
        }

        function openPoem(content) {
            isTextMode = true;
            let overlay = document.getElementById('poem-overlay');
            let contentDiv = document.getElementById('poem-content');
            contentDiv.innerText = content.replace(/\\n/g, '\n');
            overlay.style.display = 'flex';
            document.getElementById('ui-layer').style.opacity = '0';
        }

        function closePoem() {
            isTextMode = false;
            document.getElementById('poem-overlay').style.display = 'none';
            document.getElementById('ui-layer').style.opacity = '1';
            for(let s of bgStars) s.recluster();
            for(let n of poemNodes) n.recluster();
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
